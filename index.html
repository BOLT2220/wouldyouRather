<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Would You Rather? 🔥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════
       CSS VARIABLES & RESET
    ═══════════════════════════════════════ */
    :root {
      --red:         #ff3b3b;
      --red-dark:    #c01a1a;
      --red-glow:    rgba(255,59,59,0.45);
      --blue:        #2979ff;
      --blue-dark:   #0d47a1;
      --blue-glow:   rgba(41,121,255,0.45);
      --bg:          #0e0e14;
      --surface:     #16161f;
      --text-light:  #f5f5f5;
      --text-muted:  rgba(255,255,255,0.45);
      --font-title:  'Bebas Neue', cursive;
      --font-body:   'Nunito', sans-serif;
      --transition:  cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-light);
      overflow: hidden;        /* No scrollbar during game */
    }

    /* ═══════════════════════════════════════
       LAYOUT SHELL
    ═══════════════════════════════════════ */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 0 8px;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    .header {
      text-align: center;
      padding: 18px 20px 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header h1 {
      font-family: var(--font-title);
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 4px;
      /* Two-tone title: "WOULD YOU" red, "RATHER?" blue */
      background: linear-gradient(90deg, var(--red) 0%, #ff7a7a 48%, var(--blue) 52%, #6fa8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(255,59,59,0.25));
    }

    .question-counter {
      margin-top: 6px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .progress-bar {
      margin: 10px auto 0;
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--blue));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* ═══════════════════════════════════════
       DIVIDER "OR"
    ═══════════════════════════════════════ */
    .or-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--bg);
      border: 3px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-title);
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.6);
      z-index: 20;
      pointer-events: none;
      box-shadow: 0 0 0 6px var(--bg);
      transition: transform 0.4s var(--transition), box-shadow 0.3s;
    }
    .or-badge.pop { animation: orPop 0.4s var(--transition); }

    /* ═══════════════════════════════════════
       CARDS ARENA
    ═══════════════════════════════════════ */
    .arena {
      flex: 1;
      display: flex;
      gap: 0;
      position: relative;
      padding: 0 16px;
      min-height: 0;
    }

    /* Each card is one half */
    .card {
      flex: 1;
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 22px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition:
        transform 0.25s var(--transition),
        box-shadow 0.3s ease,
        flex 0.5s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Red card */
    .card-a {
      margin-right: 8px;
      background: linear-gradient(145deg, #1f0a0a 0%, #2d0d0d 60%, #1a0505 100%);
      border: 1.5px solid rgba(255,59,59,0.18);
    }
    .card-a:hover { transform: scale(1.025); box-shadow: 0 0 40px var(--red-glow), 0 16px 48px rgba(0,0,0,0.5); }
    .card-a:active { transform: scale(0.97); }

    /* Blue card */
    .card-b {
      margin-left: 8px;
      background: linear-gradient(145deg, #040d1f 0%, #0a1533 60%, #050a1a 100%);
      border: 1.5px solid rgba(41,121,255,0.18);
    }
    .card-b:hover { transform: scale(1.025); box-shadow: 0 0 40px var(--blue-glow), 0 16px 48px rgba(0,0,0,0.5); }
    .card-b:active { transform: scale(0.97); }

    /* Disabled state after voting */
    .card.voted   { cursor: default; }
    .card.voted:hover { transform: none; }
    .card.chosen  { border-width: 2.5px; }
    .card-a.chosen { border-color: var(--red); box-shadow: 0 0 48px var(--red-glow); }
    .card-b.chosen { border-color: var(--blue); box-shadow: 0 0 48px var(--blue-glow); }

    /* Shrink loser card */
    .arena.revealed .card:not(.chosen) { flex: 0.72; opacity: 0.55; }
    .arena.revealed .card.chosen       { flex: 1.28; }

    /* Decorative corner glow */
    .card::before {
      content: '';
      position: absolute;
      border-radius: inherit;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card-a::before { background: radial-gradient(circle at 30% 30%, rgba(255,59,59,0.18) 0%, transparent 65%); }
    .card-b::before { background: radial-gradient(circle at 70% 30%, rgba(41,121,255,0.18) 0%, transparent 65%); }
    .card:hover::before { opacity: 1; }

    /* Emoji */
    .card-emoji {
      font-size: clamp(2.6rem, 6vw, 4rem);
      margin-bottom: 14px;
      line-height: 1;
      animation: floatEmoji 3s ease-in-out infinite;
      display: block;
    }
    .card-b .card-emoji { animation-delay: -1.5s; }

    /* Option label (A / B) */
    .card-label {
      font-family: var(--font-title);
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      margin-bottom: 10px;
      opacity: 0.55;
    }
    .card-a .card-label { color: var(--red); }
    .card-b .card-label { color: var(--blue); }

    /* Main text */
    .card-text {
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.35;
      color: #fff;
      transition: transform 0.3s ease;
    }

    /* ── RESULT OVERLAY inside card ── */
    .card-result {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.45s 0.2s ease, transform 0.45s 0.2s ease;
      pointer-events: none;
    }
    .arena.revealed .card-result {
      opacity: 1;
      transform: translateY(0);
    }

    /* Percentage text */
    .pct-text {
      font-family: var(--font-title);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }
    .card-a .pct-text { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }
    .card-b .pct-text { color: var(--blue); text-shadow: 0 0 20px var(--blue-glow); }

    /* Bar inside result */
    .result-bar {
      width: 100%;
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .result-bar-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 0.8s 0.3s ease;
    }
    .card-a .result-bar-fill { background: var(--red); }
    .card-b .result-bar-fill { background: var(--blue); }

    .votes-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Winner crown */
    .winner-crown {
      position: absolute;
      top: -8px;
      right: 16px;
      font-size: 1.6rem;
      opacity: 0;
      transform: translateY(-6px) rotate(15deg);
      transition: opacity 0.4s 0.5s ease, transform 0.4s 0.5s ease;
    }
    .card.chosen .winner-crown {
      opacity: 1;
      transform: translateY(0) rotate(0deg);
    }

    /* Ripple effect on click */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      pointer-events: none;
      animation: rippleAnim 0.6s ease-out forwards;
    }
    .card-a .ripple { background: rgba(255,59,59,0.35); }
    .card-b .ripple { background: rgba(41,121,255,0.35); }

    /* ═══════════════════════════════════════
       BOTTOM ACTION ROW
    ═══════════════════════════════════════ */
    .action-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px 6px;
      gap: 12px;
      min-height: 54px;
    }

    .btn-next {
      padding: 12px 40px;
      background: linear-gradient(135deg, #1f1f2e, #2a2a40);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s 0.5s ease, transform 0.4s 0.5s ease, background 0.2s, box-shadow 0.2s;
      pointer-events: none;
    }
    .btn-next.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .btn-next:hover {
      background: linear-gradient(135deg, #2a2a3e, #363654);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    .btn-next:active { transform: scale(0.96); }

    /* Skip text link */
    .btn-skip {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s 0.55s ease, color 0.2s;
    }
    .btn-skip.visible { opacity: 1; pointer-events: all; }
    .btn-skip:hover { color: rgba(255,255,255,0.7); }

    /* ═══════════════════════════════════════
       AD PLACEHOLDER
    ═══════════════════════════════════════ */
    .ad-slot {
      flex-shrink: 0;
      margin: 4px 16px 0;
      height: 56px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,0.2);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .ad-slot::before { content: '▦'; font-size: 1rem; }

    /* ═══════════════════════════════════════
       GAME OVER SCREEN
    ═══════════════════════════════════════ */
    .game-over {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 30px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 100;
    }
    .game-over.active { opacity: 1; pointer-events: all; }

    .game-over h2 {
      font-family: var(--font-title);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--red), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .game-over p { color: var(--text-muted); font-size: 1rem; max-width: 320px; line-height: 1.6; }

    .btn-restart {
      margin-top: 8px;
      padding: 14px 50px;
      background: linear-gradient(135deg, var(--red-dark), #8b0000);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 0 30px var(--red-glow);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-restart:hover { transform: scale(1.04); box-shadow: 0 0 48px var(--red-glow); }
    .btn-restart:active { transform: scale(0.97); }

    /* ═══════════════════════════════════════
       KEYFRAME ANIMATIONS
    ═══════════════════════════════════════ */
    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes rippleAnim {
      from { transform: scale(0); opacity: 1; }
      to   { transform: scale(4); opacity: 0; }
    }

    @keyframes orPop {
      0%   { transform: translate(-50%,-50%) scale(1); }
      40%  { transform: translate(-50%,-50%) scale(1.35); }
      100% { transform: translate(-50%,-50%) scale(1); }
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card { animation: cardEnter 0.5s var(--transition) both; }
    .card-b { animation-delay: 0.07s; }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 540px) {
      .arena { flex-direction: column; padding: 0 12px; }
      .card  { flex: 1 !important; }
      .card-a { margin-right: 0; margin-bottom: 8px; }
      .card-b { margin-left: 0; }
      .or-badge { top: 50%; transform: translate(-50%, -50%); }
      .arena.revealed .card:not(.chosen) { flex: 0.7 !important; }
      .arena.revealed .card.chosen       { flex: 1.3 !important; }
      html, body { overflow: auto; }
    }
  </style>
</head>

/* ══════════════════════════════════════════════════════════
   GAME CONFIG
══════════════════════════════════════════════════════════ */
const QUESTIONS_PER_ROUND = 10;  // Change this to play more/fewer per round

/* ══════════════════════════════════════════════════════════
   SHUFFLE UTILITY — Fisher-Yates
══════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Pick N random unique questions for this round */
function pickRound() {
  return shuffle(ALL_QUESTIONS).slice(0, QUESTIONS_PER_ROUND);
}

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let QUESTIONS    = pickRound();   // Active round questions
let currentIndex = 0;
let voted        = false;

/* ══════════════════════════════════════════════════════════
   DOM REFERENCES
══════════════════════════════════════════════════════════ */
const arena      = document.getElementById('arena');
const cardA      = document.getElementById('cardA');
const cardB      = document.getElementById('cardB');
const textA      = document.getElementById('textA');
const textB      = document.getElementById('textB');
const emojiA     = document.getElementById('emojiA');
const emojiB     = document.getElementById('emojiB');
const pctA       = document.getElementById('pctA');
const pctB       = document.getElementById('pctB');
const barA       = document.getElementById('barA');
const barB       = document.getElementById('barB');
const votesA     = document.getElementById('votesA');
const votesB     = document.getElementById('votesB');
const counter    = document.getElementById('counter');
const progress   = document.getElementById('progress');
const btnNext    = document.getElementById('btnNext');
const btnSkip    = document.getElementById('btnSkip');
const orBadge    = document.getElementById('orBadge');
const gameOver   = document.getElementById('gameOver');
const btnRestart = document.getElementById('btnRestart');

/* ══════════════════════════════════════════════════════════
   LOAD QUESTION
══════════════════════════════════════════════════════════ */
function loadQuestion() {
  const q = QUESTIONS[currentIndex];
  voted = false;

  // Map compact keys → display fields
  textA.textContent  = q.a  || q.textA;
  textB.textContent  = q.b  || q.textB;
  emojiA.textContent = q.eA || q.emojiA || '🔥';
  emojiB.textContent = q.eB || q.emojiB || '💀';

  counter.textContent  = `QUESTION ${currentIndex + 1} OF ${QUESTIONS.length}`;
  progress.style.width = `${((currentIndex + 1) / QUESTIONS.length) * 100}%`;

  pctA.textContent = '0%';
  pctB.textContent = '0%';
  barA.style.width = '0%';
  barB.style.width = '0%';
  votesA.textContent = '';
  votesB.textContent = '';

  cardA.classList.remove('voted','chosen');
  cardB.classList.remove('voted','chosen');
  arena.classList.remove('revealed');
  btnNext.classList.remove('visible');
  btnSkip.classList.remove('visible');

  // Re-trigger entry animation
  [cardA, cardB].forEach(c => {
    c.style.animation = 'none';
    void c.offsetWidth;
    c.style.animation = '';
  });
}

/* ══════════════════════════════════════════════════════════
   HANDLE VOTE
══════════════════════════════════════════════════════════ */
function handleVote(choice) {
  if (voted) return;
  voted = true;

  const isA        = choice === 'A';
  const chosen     = isA ? cardA : cardB;
  const rejected   = isA ? cardB : cardA;

  spawnRipple(chosen);

  orBadge.classList.remove('pop');
  void orBadge.offsetWidth;
  orBadge.classList.add('pop');

  chosen.classList.add('voted','chosen');
  rejected.classList.add('voted');

  // Random-ish percentages (35–65 range for realism)
  const pA = 35 + Math.floor(Math.random() * 31);
  const pB = 100 - pA;

  const total  = Math.floor(Math.random() * 5000) + 7000;
  const countA = Math.round(total * pA / 100);
  const countB = total - countA;

  pctA.textContent   = `${pA}%`;
  pctB.textContent   = `${pB}%`;
  votesA.textContent = `${countA.toLocaleString()} votes`;
  votesB.textContent = `${countB.toLocaleString()} votes`;

  arena.classList.add('revealed');

  setTimeout(() => {
    barA.style.width = `${pA}%`;
    barB.style.width = `${pB}%`;
  }, 80);

  btnNext.classList.add('visible');
  btnSkip.classList.add('visible');
}

/* ══════════════════════════════════════════════════════════
   NEXT / SKIP / RESTART
══════════════════════════════════════════════════════════ */
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= QUESTIONS.length) {
    showGameOver();
  } else {
    loadQuestion();
  }
}

function showGameOver() {
  gameOver.classList.add('active');
}

btnNext.addEventListener('click', nextQuestion);
btnSkip.addEventListener('click', nextQuestion);

btnRestart.addEventListener('click', () => {
  // Fresh random round every restart — no repeats from last game!
  QUESTIONS    = pickRound();
  currentIndex = 0;
  gameOver.classList.remove('active');
  loadQuestion();
});

/* ══════════════════════════════════════════════════════════
   CARD CLICK + KEYBOARD
══════════════════════════════════════════════════════════ */
cardA.addEventListener('click',   () => handleVote('A'));
cardB.addEventListener('click',   () => handleVote('B'));
cardA.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') handleVote('A'); });
cardB.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') handleVote('B'); });

/* ══════════════════════════════════════════════════════════
   RIPPLE HELPER
══════════════════════════════════════════════════════════ */
function spawnRipple(card) {
  const ripple = document.createElement('div');
  ripple.classList.add('ripple');
  const size = Math.max(card.offsetWidth, card.offsetHeight) * 1.8;
  ripple.style.cssText = `
    width:${size}px; height:${size}px;
    left:${card.offsetWidth/2 - size/2}px;
    top:${card.offsetHeight/2 - size/2}px;
  `;
  card.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
}

/* ══════════════════════════════════════════════════════════
   START
   Total pool: ${ALL_QUESTIONS.length}+ questions
   Each game:  ${QUESTIONS_PER_ROUND} random, never the same twice per session
══════════════════════════════════════════════════════════ */
loadQuestion();
